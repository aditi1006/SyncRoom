# Render Blueprint, deploys the whole app (SPA + Socket.IO signaling) as one
# service on the free plan. https://render.com/docs/blueprint-spec
#
# Single-service model: one process serves the built client AND the sockets on
# the same origin, so no separate frontend host (Vercel/Netlify) is needed and
# the browser connects its socket to "/" (same origin). The server auto-allows
# its own RENDER_EXTERNAL_URL for CORS, so CLIENT_ORIGIN can stay unset unless
# you add a custom domain (then set it to that domain).
#
# Free-plan notes:
#   - The instance sleeps after ~15 min without traffic (first load then takes
#     ~50 s to cold-start). A free uptime pinger on /healthz (e.g. UptimeRobot,
#     5-min interval) removes the cold start and fits in 750 free hours/month.
#   - Rooms are in-memory by design; a sleep/restart simply lets clients
#     auto-rejoin with their stable identity.
services:
  - type: web
    name: syncroom-server
    runtime: node
    plan: free
    # Build the whole app (shared + server + client) so the server can serve
    # the SPA from client/dist.
    buildCommand: npm ci && npm run build
    startCommand: node server/dist/index.js
    healthCheckPath: /healthz
    autoDeploy: true
    envVars:
      - key: NODE_VERSION
        value: 22.14.0
      # Production mode: disables dev-only overhead in Express/Node.
      - key: NODE_ENV
        value: production
      # Allowed browser origins for the WebSocket handshake. The default
      # *.onrender.com URL is auto-allowed; a custom domain must be listed here
      # or its sockets are rejected (join would hang). Comma-separated.
      - key: CLIENT_ORIGIN
        value: https://havnn.in,https://www.havnn.in
      #
      # Overload protection: reject new handshakes past this many concurrent
      # sockets (existing users unaffected). Tune to the instance size.
      - key: MAX_CONNECTIONS
        value: "150"
      # Self-restart if RSS crosses this (MB) so a leak is a blip, not an OOM.
      # Render free = 512 MB; 450 leaves headroom. Set 0 to disable.
      - key: MEMORY_LIMIT_MB
        value: "450"
